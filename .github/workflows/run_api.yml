name: Fetch API Data (JS)

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Set up Node.js environment (Node 18+ includes native fetch)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. Run the JavaScript script
    - name: Run Fetch Script
      run: node fetch_data.js

    # 4. Commit and push the new JSON file back to GitHub
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        
        # Only commit if changes exist to avoid empty commit errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated data fetch: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
